<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

            height: 100vh;

        @keyframes g { 
            0% { transform: translate(2px, -2px); text-shadow: 2px 0 red; } 
            50% { transform: translate(-2px, 2px); text-shadow: -2px 0 blue; } 
            100% { transform: translate(0); } 
        }
        #profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid red;
            margin-top: 20px;
            display: none; /* Pehle chhupa rahega */
            box-shadow: 0 0 20px red;
        }
    </style>
</head>

    <div id="text">Connecting to Secure Server...</div>
    
    <img id="profile-img" src="[attachment_0](attachment)" alt="Hacker Profile">

    <script>
        const t = document.getElementById('text');
        const img = document.getElementById('profile-img');

        setTimeout(() => { t.innerText = "Bypassing Facebook Encryption..."; }, 1000);
        setTimeout(() => { t.innerText = "Extracting User Credentials..."; }, 2000);
        
        // 3 Seconds baad main prank start hoga
