<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Warning</title>
    <style>
        body { 
            background: black; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            text-align: center;
        }
        #text { font-size: 18px; padding: 20px; min-height: 50px; }
        .glitch { 
            animation: g 0.1s infinite; 
            color: #ff0000; 
            font-size: 24px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        @keyframes g { 
            0% { transform: translate(2px, -2px); text-shadow: 2px 0 red; } 
            50% { transform: translate(-2px, 2px); text-shadow: -2px 0 blue; } 
            100% { transform: translate(0); } 
        }
        #profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid red;
            margin-top: 20px;
            display: none; 
            box-shadow: 0 0 30px red;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="text">Connecting to server...</div>
    
    <img id="profile-img" src="IMG_5089.jpeg" alt="Hacker Profile">

    <script>
        const t = document.getElementById('text');
        const img = document.getElementById('profile-img');

        setTimeout(() => { t.innerText = "Bypassing Security..."; }, 800);
        setTimeout(() => { t.innerText = "Targeting Facebook ID..."; }, 1600);
        setTimeout(() => { t.innerText = "Accessing Priyanka's Database..."; }, 2400);
        
        // 5 Seconds baad main prank start hoga
        setTimeout(() => { 
            t.innerHTML = "YOUR FACEBOOK ACCOUNT IS FULLY HACKED<br>Miss PRIYANKA GHOSH";
            t.classList.add('glitch');
            img.style.display = "block"; 
            document.body.style.background = "#200";
        }, 3000);
    </script>
</body>
</html>
